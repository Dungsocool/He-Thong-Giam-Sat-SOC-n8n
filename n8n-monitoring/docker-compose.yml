services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_monitoring
    restart: always
    network_mode: host
    environment:
      - N8N_HOST=dung-n8n-lab.nport.link
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://dung-n8n-lab.nport.link/
      - NODE_OPTIONS=--dns-result-order=ipv4first
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
